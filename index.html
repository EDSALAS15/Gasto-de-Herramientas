<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>GASTO DE HERRAMIENTAS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --rojo:#C10230;--gris:#F4F4F4;--azul:#0071C1;--verde:#00B050;
  --side-w:220px;--side-bg:#333F48;--side-grp:#263038;--side-txt:#ccc;
}
*{box-sizing:border-box}
body{font-family:'Segoe UI',Tahoma,sans-serif;background:var(--gris);margin:0;display:flex;flex-direction:column;min-height:100vh}
.header-bar{display:flex;align-items:stretch;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.header-logo{width:var(--side-w);background:#fefefe;display:flex;align-items:center;justify-content:center;padding:10px 16px;flex-shrink:0}
.header-logo img{height:42px;object-fit:contain;width:100%}
.header-title{flex:1;background:#E4002B;color:#fff;display:flex;align-items:center;justify-content:center;padding:14px 24px}
.header-title h2{margin:0;font-size:16px;letter-spacing:.5px}
.app-body{display:flex;flex:1}
.sidebar{width:var(--side-w);background:var(--side-bg);min-height:calc(100vh - 52px);flex-shrink:0;overflow-y:auto}
.nav-group{border-bottom:1px solid #3a4a55}
.nav-group-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;cursor:pointer;color:#fff;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--side-grp);user-select:none;transition:background .15s}
.nav-group-header:hover{background:#3a4a55}
.nav-group-header .arrow{font-size:9px;transition:transform .2s;flex-shrink:0;margin-left:6px}
.nav-group-header.open .arrow{transform:rotate(90deg)}
.nav-group-header.open{color:#E4002B}
.nav-children{display:none}.nav-children.open{display:block}
.tab-btn{display:block;width:100%;padding:10px 16px 10px 22px;cursor:pointer;border:none;border-left:3px solid transparent;background:transparent;color:var(--side-txt);font-size:10.5px;font-weight:600;text-align:left;line-height:1.4;transition:background .15s,color .15s,border-color .15s}
.tab-btn:hover{background:#3e4d58;color:#fff}
.tab-btn.active{background:rgba(193,2,48,.18)!important;color:#fff!important;border-left-color:var(--rojo)!important}
.content-area{flex:1;padding:24px;overflow-x:hidden}
.card{background:#fff;padding:25px;border-radius:12px;box-shadow:0 5px 20px rgba(0,0,0,.12)}
.filters-wrap{background:#f9f9f9;padding:7px;border-radius:8px;margin-bottom:10px;border:1px solid #eee;display:flex;flex-direction:column;gap:5px}
.filters-row{display:flex;gap:7px;flex-wrap:wrap;align-items:flex-end}
.filters-row+.filters-row{padding-top:5px;border-top:1px solid #e0e0e0}
.f-item{display:flex;align-items:center;gap:4px;position:relative}
.f-item label{font-size:8px;font-weight:700;color:#666;white-space:nowrap}
.multiselect{padding:1px 5px;border-radius:3px;border:1px solid #ccc;font-size:9px;height:20px;cursor:pointer;background:#fff;min-width:90px;max-width:160px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.dropdown-content{display:none;position:absolute;top:100%;left:0;background:#fff;border:1px solid #ccc;z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 4px 8px rgba(0,0,0,.12);padding:4px;min-width:160px;border-radius:3px}
.dropdown-content label{display:flex;align-items:center;gap:6px;padding:4px 5px;cursor:pointer;font-weight:400;font-size:10px;color:#333;white-space:nowrap}
.dropdown-content.open{display:block}
.btn-clear{background:var(--rojo);color:#fff;border:none;padding:2px 10px;cursor:pointer;border-radius:3px;font-size:9px;font-weight:700;height:20px}
.kpi-row{display:flex;gap:12px;margin-bottom:12px}
.kpi-card{flex:1;background:#f9f9f9;border:1px solid #e8e8e8;border-radius:10px;padding:12px 16px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.06);min-height:90px;text-align:center}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#999;width:100%}
.kpi-value{font-size:22px;font-weight:800;color:#333F48;line-height:1;flex:1;display:flex;align-items:center;justify-content:center;width:100%}
.kpi-sub{font-size:10px;color:#888;text-align:center;width:100%}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:22px;font-weight:800}
.kpi-delta.up{color:#FF0000}.kpi-delta.down{color:#00B050}.kpi-delta.flat{color:#757575}
.chart-title{font-size:13px;font-weight:700;color:#333;margin-bottom:6px;padding-left:2px;display:flex;align-items:center;gap:8px}
.chart-title .ct-dash{font-size:11px;font-weight:600;background:#333F48;color:#fff;padding:2px 8px;border-radius:20px}
.chart-title .ct-zone{font-size:11px;font-weight:600;background:#E4002B;color:#fff;padding:2px 8px;border-radius:20px}
.chart-title .ct-info{font-size:11px;color:#888;font-weight:500}
.chart-container{height:430px;position:relative;margin-top:10px}
#uploadArea{text-align:center;padding:40px;border:2px dashed #E4002B;border-radius:8px}
#uploadArea p{color:#666;font-size:13px}
.tabla-wrap{margin-top:20px;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.tabla-toolbar{display:flex;align-items:center;justify-content:space-between;background:#333F48;color:#fff;padding:8px 14px;font-size:11px;font-weight:700}
.btn-dl{background:#00882B;color:#fff;border:none;padding:4px 14px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:700}
.btn-dl:hover{background:#006820}
.tbl-h-scroll{overflow-x:auto;max-height:320px;overflow-y:auto}
.tbl-gen{width:100%;border-collapse:collapse;font-family:'Segoe UI',sans-serif}
.tbl-gen thead th{background:#333F48;color:#fff;padding:6px 8px;text-align:center;white-space:nowrap;font-size:10px;position:sticky;top:0;z-index:2;border-right:1px solid #4a5a68}
.tbl-gen thead th:first-child{text-align:left;min-width:60px}
.tbl-gen tbody td{padding:5px 8px;border-bottom:1px solid #eee;border-right:1px solid #eee;text-align:center;white-space:nowrap;font-size:10px}
.tbl-gen tbody td:first-child{text-align:left;font-weight:700;background:#f4f6f8;position:sticky;left:0}
.tbl-gen tbody tr:hover td{background:#edf3ff}
.tbl-gen tbody tr:hover td:first-child{background:#dce6f0}
.tbl-gen tfoot td{background:#333F48;color:#fff;font-weight:800;padding:5px 8px;text-align:center;font-size:10px;border-right:1px solid #4a5a68;position:sticky;bottom:0}
.tbl-gen tfoot td:first-child{text-align:left}
.tbl-sec-scroll{overflow-x:auto;max-height:520px;overflow-y:auto}
.tbl-sec-free{overflow-x:auto}
.tbl-sec{width:100%;border-collapse:collapse;font-family:'Segoe UI',sans-serif}
.tbl-sec thead th{background:#333F48;color:#fff;padding:8px 10px;text-align:center;white-space:nowrap;font-size:12px;position:sticky;top:0;z-index:2;border-right:1px solid #4a5a68}
.tbl-sec thead th:first-child{text-align:left;min-width:180px}
.tbl-sec tbody td{padding:7px 10px;border-bottom:1px solid #eee;border-right:1px solid #eee;text-align:center;white-space:nowrap;font-size:13px}
.tbl-sec tbody td:first-child{text-align:left;font-weight:700;background:#f4f6f8;position:sticky;left:0;font-size:13px}
.tbl-sec tbody tr:hover td{background:#edf3ff}
.tbl-sec tbody tr:hover td:first-child{background:#dce6f0}
.tbl-sec tfoot td{background:#333F48;color:#fff;font-weight:800;padding:7px 10px;text-align:center;font-size:13px;border-right:1px solid #4a5a68;position:sticky;bottom:0}
.tbl-sec tfoot td:first-child{text-align:left}
.tab-panel{display:none}.tab-panel.active{display:block}
</style>
</head>

let currentTab = 'herramientas';
let renderScheduled = false; // para debouncing

// Filtros por pestaña
const tabF = {};
TABS.forEach(t => {
  tabF[t.prefix] = Object.fromEntries(FILTER_FIELDS.map(f => [f, []]));
  tabF[t.prefix].CUENTA = [...t.defaultCuenta];
});

/* ═════════════════════════════════════════════════════════════════════
   HELPERS
   ═════════════════════════════════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const fP = v => (v && v>0) ? '$'+Math.round(v).toLocaleString('es-MX') : '-';
const tabByPrefix = p => TABS.find(t => t.prefix===p);
const tabById = id => TABS.find(t => t.id===id);

/* ═════════════════════════════════════════════════════════════════════
   CONSTRUCCIÓN DE LA UI (paneles y filtros)
   ═════════════════════════════════════════════════════════════════════ */
function buildFilterRow(p){
  // Genera el HTML de los 2 filas de filtros + botón LIMPIAR
  const row1 = ['ANO','MES','ZONA','DIVISION'];
  const row2 = ['CUENTA','CLASIFICACION','SISTEMA','COMPONENTE'];
  const mk = f => `
    <div class="f-item">
      <label>${f}</label>
      <div class="multiselect" id="${p}-ms${f}">Todos...</div>
      <div class="dropdown-content" id="${p}-opts${f}"></div>
    </div>`;
  return `
    <div class="filters-wrap">
      <div class="filters-row">
        ${row1.map(mk).join('')}
        <button class="btn-clear" data-reset="${p}">LIMPIAR FILTROS</button>
      </div>
      <div class="filters-row">${row2.map(mk).join('')}</div>
    </div>`;
}

function buildPanelHTML(t){
  const filters = buildFilterRow(t.prefix);
  if(t.tableKind==='H'){
    return `
      <div class="tab-panel active" id="panel-${t.id}">
        ${filters}
        <div class="kpi-row">
          ${[1,2,3,4,5].map(i=>`
            <div class="kpi-card">
              <div class="kpi-label" id="h-kpi${i}Lbl">KPI ${i}</div>
              <div class="kpi-value" id="h-kpi${i}">—</div>
              <div class="kpi-sub" id="h-kpi${i}Sub"></div>
            </div>`).join('')}
        </div>
        <div class="chart-title">
          <span class="ct-dash">GASTO HERRAMIENTAS</span>
          <span class="ct-zone" id="h-ctZone">Nacional</span>
          <span class="ct-info" id="h-ctInfo"></span>
        </div>
        <div class="chart-container"><canvas id="chartH"></canvas></div>
        <div class="tabla-wrap">
          <div class="tabla-toolbar">
            <span>GASTO POR AÑO Y MES — HERRAMIENTAS</span>
            <button class="btn-dl" data-csv="h-tbl">&#11015; Descargar CSV</button>
          </div>
          <div class="tbl-h-scroll">
            <table class="tbl-gen" id="h-tbl">
              <thead id="h-tblHead"></thead><tbody id="h-tblBody"></tbody><tfoot id="h-tblFoot"></tfoot>
            </table>
          </div>
        </div>
      </div>`;
  }
  // SEC (divisiones/componentes/diversas)
  return `
    <div class="tab-panel" id="panel-${t.id}">
      ${filters}
      <div class="tabla-wrap">
        <div class="tabla-toolbar">
          <span id="${t.prefix}-tblTitulo">${t.label.toUpperCase()}</span>
          <button class="btn-dl" data-csv="${t.prefix}-tbl">&#11015; Descargar CSV</button>
        </div>
        <div class="${t.tableClass}">
          <table class="tbl-sec" id="${t.prefix}-tbl">
            <thead id="${t.prefix}-tblHead"></thead><tbody id="${t.prefix}-tblBody"></tbody><tfoot id="${t.prefix}-tblFoot"></tfoot>
          </table>
        </div>
      </div>
    </div>`;
}

function renderPanels(){
  $('panels').innerHTML = TABS.map(buildPanelHTML).join('');
  // Establecer solo el primer panel como activo
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i===0));
}

/* ═════════════════════════════════════════════════════════════════════
   CARGA DEL EXCEL (optimizado)
   ═════════════════════════════════════════════════════════════════════ */
function procesar(buf){
  const t0 = performance.now();
  const wb = XLSX.read(buf, {type:'array', cellDates:true, cellFormula:false, cellHTML:false, cellStyles:false, sheetStubs:false});
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const range = XLSX.utils.decode_range(sheet['!ref']);

  // Leer encabezados
  const headers = [];
  for(let c=range.s.c; c<=range.e.c; c++){
    const cell = sheet[XLSX.utils.encode_cell({r:range.s.r, c})];
    headers.push(cell ? String(cell.v).trim().toUpperCase() : '');
  }
  const colIdx = name => headers.indexOf(name);
  const iFecha = colIdx('FECHA CONTABLE'), iImp = colIdx('IMPORTE');
  const iCta = colIdx('CUENTA'), iCla = colIdx('CLASIFICACION');
  const iSis = colIdx('SISTEMA'), iCom = colIdx('COMPONENTE');
  const iDiv = colIdx('DIVISION'), iZon = colIdx('ZONA');

  const out = new Array(range.e.r - range.s.r);
  let outIdx = 0;
  const uCta = new Set(), uCla = new Set(), uSis = new Set(),
        uCom = new Set(), uDiv = new Set(), uZon = new Set(), uYears = new Set();

  // Helper inline: obtener string de celda por fila/col
  const encode = XLSX.utils.encode_cell;
  for(let r=range.s.r+1; r<=range.e.r; r++){
    const fc = sheet[encode({r, c:iFecha})];
    let yr=0, mo=0;
    if(fc){
      const d = fc.v instanceof Date ? fc.v : new Date(fc.v);
      if(!isNaN(d)){ yr=d.getFullYear(); mo=d.getMonth()+1; }
    }
    const ic = sheet[encode({r, c:iImp})];
    const imp = ic ? Math.abs(+ic.v||0) : 0;

    const cta = (c=sheet[encode({r,c:iCta})]) => c?String(c.v).trim():'';
    // inline extraction
    const _cta = sheet[encode({r,c:iCta})], cuenta = _cta?String(_cta.v).trim():'';
    const _cla = sheet[encode({r,c:iCla})], clas   = _cla?String(_cla.v).trim():'';
    const _sis = sheet[encode({r,c:iSis})], sis    = _sis?String(_sis.v).trim():'';
    const _com = sheet[encode({r,c:iCom})], comp   = _com?String(_com.v).trim():'';
    const _div = sheet[encode({r,c:iDiv})], divn   = _div?String(_div.v).trim():'';
    const _zon = sheet[encode({r,c:iZon})], zona   = _zon?String(_zon.v).trim():'';

    if(yr)     uYears.add(yr);
    if(cuenta) uCta.add(cuenta);
    if(clas)   uCla.add(clas);
    if(sis)    uSis.add(sis);
    if(comp)   uCom.add(comp);
    if(divn)   uDiv.add(divn);
    if(zona)   uZon.add(zona);

    out[outIdx++] = {_Y:yr, _M:mo, _IMP:imp, CUENTA:cuenta, CLASIFICACION:clas, SISTEMA:sis, COMPONENTE:comp, DIVISION:divn, ZONA:zona};
  }
  out.length = outIdx;
  rawData = out;

  allYearsG = [...uYears].sort((a,b)=>a-b);
  uniqueCache = {
    ANO: allYearsG, MES: MN,
    ZONA: [...uZon].sort(), DIVISION: [...uDiv].sort(),
    CUENTA: [...uCta].sort(), CLASIFICACION: [...uCla].sort(),
    SISTEMA: [...uSis].sort(), COMPONENTE: [...uCom].sort()
  };

  console.log(`Excel parseado en ${(performance.now()-t0).toFixed(0)} ms — ${rawData.length} filas`);

  // Construir UI una vez que tenemos los datos
  renderPanels();
  $('mainUI').style.display='block';
  $('uploadArea').style.display='none';

  // Construir filtros de todas las pestañas
  TABS.forEach(t => buildF(t.prefix));
  renderTab('herramientas');
}

/* ═════════════════════════════════════════════════════════════════════
   FILTROS
   ═════════════════════════════════════════════════════════════════════ */
function buildF(p){
  FILTER_FIELDS.forEach(fld => {
    const dd = $(`${p}-opts${fld}`);
    if(!dd) return;
    const vals = uniqueCache[fld] || [];
    const selected = new Set(tabF[p][fld] || []);
    dd.innerHTML = vals.map(v => {
      const checked = (selected.has(v) || selected.has(Number(v))) ? ' checked' : '';
      return `<label><input type="checkbox" value="${v}"${checked}> ${v}</label>`;
    }).join('');
    const ms = $(`${p}-ms${fld}`);
    if(ms) ms.innerText = tabF[p][fld].length ? tabF[p][fld].join(', ') : 'Todos...';
  });
}

function onFilterChange(p, fld){
  const dd = $(`${p}-opts${fld}`);
  if(!dd) return;
  tabF[p][fld] = Array.from(dd.querySelectorAll('input:checked'))
    .map(i => fld==='ANO' ? Number(i.value) : i.value);
  const ms = $(`${p}-ms${fld}`);
  if(ms) ms.innerText = tabF[p][fld].length ? tabF[p][fld].join(', ') : 'Todos...';
  scheduleRender();
}

// Debouncing: agrupa renders en un solo frame
function scheduleRender(){
  if(renderScheduled) return;
  renderScheduled = true;
  requestAnimationFrame(() => {
    renderScheduled = false;
    renderTab(currentTab);
  });
}

function resetFilters(p){
  const t = tabByPrefix(p);
  tabF[p] = Object.fromEntries(FILTER_FIELDS.map(f => [f, []]));
  tabF[p].CUENTA = [...t.defaultCuenta];
  buildF(p);
  renderTab(currentTab);
}

/* ═════════════════════════════════════════════════════════════════════
   FILTRADO DE DATOS
   ═════════════════════════════════════════════════════════════════════ */
function applyF(p, ignoreYear){
  const f = tabF[p];
  const sA = (!ignoreYear && f.ANO.length) ? new Set(f.ANO) : null;
  const sM = f.MES.length ? new Set(f.MES) : null;
  const sZ = f.ZONA.length ? new Set(f.ZONA) : null;
  const sD = f.DIVISION.length ? new Set(f.DIVISION) : null;
  const sC = f.CUENTA.length ? new Set(f.CUENTA) : null;
  const sCl= f.CLASIFICACION.length ? new Set(f.CLASIFICACION) : null;
  const sS = f.SISTEMA.length ? new Set(f.SISTEMA) : null;
  const sCo= f.COMPONENTE.length ? new Set(f.COMPONENTE) : null;
  const out = [];
  const n = rawData.length;
  for(let i=0; i<n; i++){
    const d = rawData[i];
    if(sA  && !sA.has(d._Y)) continue;
    if(sM  && !sM.has(MN[d._M-1])) continue;
    if(sZ  && !sZ.has(d.ZONA)) continue;
    if(sD  && !sD.has(d.DIVISION)) continue;
    if(sC  && !sC.has(d.CUENTA)) continue;
    if(sCl && !sCl.has(d.CLASIFICACION)) continue;
    if(sS  && !sS.has(d.SISTEMA)) continue;
    if(sCo && !sCo.has(d.COMPONENTE)) continue;
    out.push(d);
  }
  return out;
}

/* ═════════════════════════════════════════════════════════════════════
   RENDER
   ═════════════════════════════════════════════════════════════════════ */
function renderTab(tabId){
  const t = tabById(tabId);
  if(!t) return;
  if(t.tableKind==='H') renderH(t.prefix);
  else renderSec(t);
}

// ── Pestaña HERRAMIENTAS ──
function renderH(p){
  const selYears = tabF[p].ANO.slice().sort();
  const noYearData = applyF(p, true);

  // Agrupar por año-mes en una sola pasada
  const byYM = {};
  const yearsSet = new Set();
  for(let i=0; i<noYearData.length; i++){
    const d = noYearData[i];
    const k = `${d._Y}-${d._M}`;
    byYM[k] = (byYM[k]||0) + d._IMP;
    yearsSet.add(d._Y);
  }

  const allDataYears = [...yearsSet].sort((a,b)=>a-b);
  const curYear = selYears.length ? selYears[selYears.length-1] : (allDataYears[allDataYears.length-1] || new Date().getFullYear());
  const prevYear = curYear - 1;

  const dCur  = ALL12.map(m => byYM[`${curYear}-${m}`]  || 0);
  const dPrev = ALL12.map(m => byYM[`${prevYear}-${m}`] || 0);

  // KPIs
  const sumCur = dCur.reduce((a,b)=>a+b, 0);
  const sumPrevSame = ALL12.reduce((a,m,i) => a + (dCur[i]>0 ? (dPrev[i]||0) : 0), 0);
  const varPct = sumPrevSame>0 ? ((sumCur-sumPrevSame)/sumPrevSame)*100 : 0;
  const nMes = dCur.filter(v => v>0).length || 1;
  const maxVal = Math.max(...dCur.filter(v => v>0), 0);
  const maxMes = maxVal>0 ? MC[dCur.indexOf(maxVal)] : '-';

  // Pintar KPIs
  const arrow = varPct>0 ? '▲' : varPct<0 ? '▼' : '●';
  const cls   = varPct>0 ? 'up' : varPct<0 ? 'down' : 'flat';

  const kpis = [
    ['Gasto Año Actual',        fP(sumCur),                                    `Año ${curYear}`],
    ['Variación vs Año Ant.',   `<span class="kpi-delta ${cls}">${arrow} ${Math.abs(varPct).toFixed(1)}%</span>`, `vs ${prevYear}`],
    ['Gasto Año Anterior',      fP(sumPrevSame),                               `Año ${prevYear}`],
    ['Promedio Mensual',        fP(sumCur/nMes),                               'Mensual'],
    ['Mes Mayor Gasto',         maxMes,                                        fP(maxVal)]
  ];
  kpis.forEach(([lbl, val, sub], i) => {
    const n = i+1;
    $(`h-kpi${n}Lbl`).textContent = lbl;
    $(`h-kpi${n}`).innerHTML = val;
    $(`h-kpi${n}Sub`).textContent = sub;
  });

  $('h-ctZone').textContent = tabF[p].DIVISION.length ? tabF[p].DIVISION.join(', ') : 'Nacional';
  $('h-ctInfo').textContent = `${prevYear} vs ${curYear}`;

  // Gráfica
  drawChart(dCur, dPrev, curYear, prevYear);

  // Tabla: meses filas × años columnas DESC; total por año como fila final
  const yearsDesc = allDataYears.slice().sort((a,b)=>b-a);
  const head = $('h-tblHead'), body = $('h-tblBody'), foot = $('h-tblFoot');
  head.innerHTML = '<tr><th>MES</th>' + yearsDesc.map(y=>`<th>${y}</th>`).join('') + '</tr>';
  body.innerHTML = ALL12.map(m => {
    const vals = yearsDesc.map(y => byYM[`${y}-${m}`] || 0);
    return `<tr><td>${MC[m-1]}</td>${vals.map(v => `<td>${v>0?fP(v):'-'}</td>`).join('')}</tr>`;
  }).join('');
  const totByYear = yearsDesc.map(y => ALL12.reduce((a,m) => a + (byYM[`${y}-${m}`]||0), 0));
  foot.innerHTML = `<tr><td>TOTAL</td>${totByYear.map(v => `<td>${v>0?fP(v):'-'}</td>`).join('')}</tr>`;
}

// ── Gráfica del dashboard Herramientas ──
function drawChart(dCur, dPrev, curYear, prevYear){
  if(charts.h){ charts.h.destroy(); charts.h=null; }
  const yMax = Math.max(...dCur, ...dPrev, 1) * 1.08;
  charts.h = new Chart($('chartH'), {
    data: {
      labels: MC,
      datasets: [
        { label: String(curYear),  type:'bar', data:dCur,
          backgroundColor:'#C10230', borderColor:'#a00220', borderWidth:1, order:0 },
        { label: String(prevYear), type:'line', data:dPrev,
          borderColor:'rgba(0,0,0,0)', backgroundColor:'rgba(180,180,180,0.32)',
          fill:true, tension:0, pointRadius:0, pointHoverRadius:3, borderWidth:0, order:1 }
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      scales: {
        x: { grid:{display:false} },
        y: { grid:{display:false}, beginAtZero:true, max:yMax,
             ticks:{callback: v => '$'+Math.round(v).toLocaleString('es-MX')} }
      },
      plugins: {
        legend: { position:'bottom' },
        tooltip: {
          mode:'index', intersect:false,
          callbacks: {
            label: ctx => {
              if(ctx.datasetIndex===0 && !(ctx.raw>0)) return null;
              return `${ctx.dataset.label}: ${fP(ctx.raw)}`;
            }
          }
        }
      }
    },
    plugins: [{
      id: 'barLabels',
      afterDatasetsDraw(chart){
        const { ctx } = chart;
        const meta = chart.getDatasetMeta(0);
        if(!meta || meta.type!=='bar') return;
        ctx.save();
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 10px Segoe UI, sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        const data = chart.data.datasets[0].data;
        meta.data.forEach((bar, i) => {
          const v = data[i];
          if(!(v>0)) return;
          ctx.fillText('$'+Math.round(v).toLocaleString('es-MX'), bar.x, bar.y + 6);
        });
        ctx.restore();
      }
    }]
  });
}

// ── Pestañas SEC (divisiones/componentes/diversas) ──
function renderSec(t){
  const p = t.prefix;
  const data = applyF(p, false);

  // Determinar año actual (máx seleccionado o último disponible)
  let curYear = new Date().getFullYear();
  if(tabF[p].ANO.length){
    curYear = Math.max(...tabF[p].ANO);
  } else {
    let mx = 0;
    for(let i=0; i<data.length; i++) if(data[i]._Y > mx) mx = data[i]._Y;
    if(mx) curYear = mx;
  }

  // Agrupar por grupo × mes en una sola pasada
  const grpMap = {};
  for(let i=0; i<data.length; i++){
    const d = data[i];
    if(d._Y !== curYear) continue;
    const g = d[t.groupField] || '(Sin dato)';
    let row = grpMap[g];
    if(!row){ row = grpMap[g] = new Array(13).fill(0); }  // índices 1..12 + [0] suma total
    row[d._M] += d._IMP;
    row[0]    += d._IMP;
  }

  const sorted = Object.entries(grpMap)
    .map(([g, arr]) => ({ g, arr }))
    .sort((a,b) => b.arr[0] - a.arr[0]);

  const titleEl = $(`${p}-tblTitulo`);
  if(titleEl) titleEl.textContent = `GASTO POR ${t.groupLabel} — AÑO ${curYear}`;

  const head = $(`${p}-tblHead`), body = $(`${p}-tblBody`), foot = $(`${p}-tblFoot`);
  head.innerHTML = `<tr><th>${t.groupLabel}</th>${ALL12.map(m=>`<th>${MC[m-1]}</th>`).join('')}<th>TOTAL</th></tr>`;

  body.innerHTML = sorted.map(({g, arr}) =>
    `<tr><td>${g}</td>${ALL12.map(m => `<td>${arr[m]?fP(arr[m]):'-'}</td>`).join('')}<td>${fP(arr[0])}</td></tr>`
  ).join('');

  const footVals = ALL12.map(m => sorted.reduce((a,s) => a + s.arr[m], 0));
  const grand = footVals.reduce((a,b) => a+b, 0);
  foot.innerHTML = `<tr><td>TOTAL</td>${footVals.map(v => `<td>${v>0?fP(v):'-'}</td>`).join('')}<td>${fP(grand)}</td></tr>`;
}

/* ═════════════════════════════════════════════════════════════════════
   UI HANDLERS (navegación, dropdowns, CSV)
   ═════════════════════════════════════════════════════════════════════ */
function cambiarVista(tabId){
  currentTab = tabId;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab===tabId));
  document.querySelectorAll('.tab-panel').forEach(pnl => pnl.classList.toggle('active', pnl.id===`panel-${tabId}`));
  renderTab(tabId);
}

function descargarCSV(tblId){
  const tbl = $(tblId);
  if(!tbl) return;
  const csv = '﻿' + [...tbl.querySelectorAll('tr')].map(r =>
    [...r.querySelectorAll('th,td')].map(c => '"'+c.textContent.trim().replace(/"/g,'""')+'"').join(',')
  ).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv;charset=utf-8;'}));
  a.download = tblId.replace('-','_')+'_datos.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

/* ═════════════════════════════════════════════════════════════════════
   EVENT DELEGATION (un solo listener para todo)
   ═════════════════════════════════════════════════════════════════════ */

// Click global: navegación, dropdowns, CSV, reset
document.addEventListener('click', e => {
  const tgt = e.target;

  // Tab button
  const tabBtn = tgt.closest('[data-tab]');
  if(tabBtn){ cambiarVista(tabBtn.dataset.tab); return; }

  // Nav group toggle
  const grpHdr = tgt.closest('[data-grp]');
  if(grpHdr){
    const id = grpHdr.dataset.grp;
    grpHdr.classList.toggle('open');
    $(`children-${id}`).classList.toggle('open');
    return;
  }

  // Reset button
  const resetBtn = tgt.closest('[data-reset]');
  if(resetBtn){ resetFilters(resetBtn.dataset.reset); return; }

  // CSV download
  const csvBtn = tgt.closest('[data-csv]');
  if(csvBtn){ descargarCSV(csvBtn.dataset.csv); return; }

  // Multiselect toggle
  const ms = tgt.closest('.multiselect');
  if(ms){
    const dd = ms.nextElementSibling;
    if(dd && dd.classList.contains('dropdown-content')){
      const wasOpen = dd.classList.contains('open');
      document.querySelectorAll('.dropdown-content').forEach(d => d.classList.remove('open'));
      if(!wasOpen) dd.classList.add('open');
    }
    return;
  }

  // Click dentro de un dropdown → no cerrar
  if(tgt.closest('.dropdown-content')) return;

  // Click afuera → cerrar todos los dropdowns abiertos
  document.querySelectorAll('.dropdown-content.open').forEach(d => d.classList.remove('open'));
});

// Change global: checkboxes de filtros
document.addEventListener('change', e => {
  const tgt = e.target;

  // File upload
  if(tgt.id==='fileInput'){
    const rd = new FileReader();
    rd.onload = ev => procesar(ev.target.result);
    rd.readAsArrayBuffer(tgt.files[0]);
    return;
  }

  // Checkbox de filtro: el dropdown tiene id como "{prefix}-opts{FIELD}"
  if(tgt.type==='checkbox'){
    const dd = tgt.closest('.dropdown-content');
    if(!dd) return;
    const m = dd.id.match(/^(\w+)-opts(\w+)$/);
    if(m) onFilterChange(m[1], m[2]);
  }
});

/* ═════════════════════════════════════════════════════════════════════
   INICIALIZACIÓN
   ═════════════════════════════════════════════════════════════════════ */
window.addEventListener('load', () => {
  fetch(EXCEL_URL+'?v='+Date.now(), {cache:'no-store'})
    .then(r => { if(!r.ok) throw 0; return r.arrayBuffer(); })
    .then(procesar)
    .catch(() => {
      $('autoLoadMsg').style.display='none';
      $('manualLoad').style.display='block';
    });
});
</script>
